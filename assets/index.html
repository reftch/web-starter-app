<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Page</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Welcome to simple Web Page</h1>
        <p>This is a simple web page that includes a PNG image.</p>
        <img src="image.png" alt="A sample PNG image" class="centered-image">
        <div>
            Current temperature:
            <span id="timeDisplay">Loading...</span>°C
        </div>
        <a href="/home">Home page</a>
    </div>

    <script>

        const timeDisplay = document.getElementById('timeDisplay');

        async function updateServerTime(value) {
            try {
                // const response = await fetch(`/api/v1/inc/${value}`);
                const response = await fetch(`/api/v1/temperature`);
                const data = await response.json();
                // value = data.value;
                console.log(data)
                timeDisplay.textContent = data.current.temperature_2m;
                // setTimeout(() => updateServerTime(data.value), 1000);
            } catch (error) {
                console.error('Error fetching server time:', error);
                timeDisplay.textContent = 'Error';
                value = 0;
            }
            // Update immediately and then every second
            setTimeout(() => updateServerTime(value), 1000 * 60);
            // updateServerTime(value);
        }
        updateServerTime(0);        
    </script>
</body>

</html>
