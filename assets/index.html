<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Page</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Welcome to simple Web Page</h1>
        <p>This is a simple web page that includes a PNG image.</p>
        <img src="image.png" alt="A sample PNG image" class="centered-image">
        <div id="timeDisplay">Loading...</div>
        <a href="/home">Home page</a>
    </div>

    <script>
        const timeDisplay = document.getElementById('timeDisplay');

        async function updateServerTime() {
            try {
                const response = await fetch('/api/v1/time');
                const data = await response.json();
                timeDisplay.textContent = data.time;
            } catch (error) {
                console.error('Error fetching server time:', error);
                timeDisplay.textContent = 'Error';
            }
        }

        // Update immediately and then every second
        updateServerTime();
        setInterval(updateServerTime, 1000);
    </script>
</body>

</html>
